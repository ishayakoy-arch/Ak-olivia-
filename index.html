<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olivia ❤️</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            text-align: center;
            background: linear-gradient(pink, #ff69b4);
            color: white;
        }

        .slideshow img {
            width: 90%;
            max-height: 400px;
            border-radius: 20px;
            transition: opacity 0.8s ease-in-out;
        }

        button {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 20px;
            background: rgb(17, 11, 11);
            color: #ff1493;
        }

        video {
            width: 90%;
            border-radius: 15px;
            margin-top: 10px;
        }

        #musicName {
            font-weight: bold;
        }

        #time {
            font-size: 14px;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
        }
    </style>
    <link rel="apple-touch-icon" href="icon.png">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Olivia ❤️">

    <meta name="theme-color" content="#ff69b4">
</head>

<body>

    <h1>🎂 Joyeux Anniversaire 🎂</h1>

    <!-- 🎬 SLIDESHOW -->
    <div class="slideshow">
        <img id="slide" src="images/photo1.jpg">
    </div>

    <p id="text"></p>

    <!-- 🎵 MUSIQUE -->
    <audio id="musics"></audio>

    <p id="musicName">🎵 Aucune musique</p>
    <p id="time">00:00 / 00:00</p>

    <button onclick="prevMusic()">⏮️</button>
    <button onclick="togglePlay()" id="playBtn">▶️ Play</button>
    <button onclick="stopMusic()">⏹️ Stop</button>
    <button onclick="nextMusic()">⏭️</button>

    <br>
    <input type="range" min="0" max="1" step="0.1" onchange="setVolume(this.value)">

    <!-- 🎥 VIDEOS -->
    <h2>🎥 Vidéos</h2>



    <video controls>
        <source src="videos/video2.mp4" type="video/mp4">
    </video>
    <video controls>
        <source src="videos/video3.mp4" type="video/mp4">
    </video>

    <script>

        /* 🎬 SLIDESHOW */
        let slides = [
            { img: "images/photo0.jpg", text: "Tu es magnifique 💖" },
            { img: "images/photo1.jpg", text: "Toujours souriante ❤️" },
            { img: "images/photo2.jpg", text: "20 ans 🎂" },
            { img: "images/photo3.jpg", text: "Que du bonheur 🥰" },
            { img: "images/photo4.jpg", text: "tu grandi sans perdre ta beauté💕" },
            { img: "images/photo5.jpg", text: "À jamais ensemble 💑" },
            { img: "images/photo6.jpg", text: "Joyeux anniversaire 🎉" },
            { img: "images/photo7.jpg", text: "Tu es la meilleure 🌟" },
            { img: "images/photo8.jpg", text: "Merci pour tout 💝" },
            { img: "images/photo9.jpg", text: "Je t'adore 😘" },
            { img: "images/photo10.jpg", text: "20 ans de bauté🥰" },
            { img: "images/photo11.jpg", text: "Tu es la plus belle 💖" },
            { img: "images/photo12.jpg", text: "20 ans de bonheur 🎂" },
            { img: "images/photo13.jpg", text: "Toujours joyeuse ❤️" },
            { img: "images/photo14.jpg", text: "Je t'aime fort 💕" },
            { img: "images/photo15.jpg", text: "Joyeux anniversaire ma chérie 🎉" }
        ];

        let i = 0;

        function showSlide() {
            let img = document.getElementById("slide");
            let txt = document.getElementById("text");

            img.style.opacity = 0;

            setTimeout(() => {
                i = (i + 1) % slides.length;
                img.src = slides[i].img;
                txt.innerText = slides[i].text;
                img.style.opacity = 1;
            }, 500);
        }

        setInterval(showSlide, 3000);


        /* 🎵 MUSIQUE (CORRIGÉE) */
        let musics = [


            { src: "musics/music1.mp3", name: "🎶 doucement" },
            { src: "musics/music3.mp3", name: "🎶 Baddies" },
            { src: "musics/music9.mp3", name: "🎶 chérie coco" },
            ];
            let currentMusic = 0;
        let isPlaying = false;

        function loadMusic() {
            let audio = document.getElementById("musics");
            let name = document.getElementById("musicName");

            audio.src = musics[currentMusic].src;
            name.innerText = musics[currentMusic].name;
        }

        function togglePlay() {
            let audio = document.getElementById("musics");
            let btn = document.getElementById("playBtn");

            if (!isPlaying) {
                loadMusic();
                audio.play();
                btn.innerText = "⏸️ Pause";
                isPlaying = true;
            } else {
                audio.pause();
                btn.innerText = "▶️ Play";
                isPlaying = false;
            }
        }

        function nextMusic() {
            currentMusic = (currentMusic + 1) % musics.length;
            isPlaying = false;
            togglePlay();
        }

        function prevMusic() {
            currentMusic = (currentMusic - 1 + musics.length) % musics.length;
            isPlaying = false;
            togglePlay();
        }

        function stopMusic() {
            let audio = document.getElementById("musics");
            let btn = document.getElementById("playBtn");

            audio.pause();
            audio.currentTime = 0;
            btn.innerText = "▶️ Play";
            isPlaying = false;
        }

        function setVolume(v) {
            document.getElementById("musics").volume = v;
        }

        function formatTime(t) {
            if (isNaN(t)) return "00:00";
            let m = Math.floor(t / 60);
            let s = Math.floor(t % 60);
            return (m < 10 ? "0" + m : m) + ":" + (s < 10 ? "0" + s : s);
        }

        /* ⏱️ TIME + NEXT */
        window.onload = function () {
            let audio = document.getElementById("musics");

            audio.addEventListener("timeupdate", function () {
                document.getElementById("time").innerText =
                    formatTime(audio.currentTime) + " / " + formatTime(audio.duration);
            });

            audio.addEventListener("ended", nextMusic);
        };

    </script>

</body>

</html>
